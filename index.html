<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Krishi Nirnay</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>🌾 Krishi Nirnay</h1>
</div>

<!-- HEADER -->
<div class="header">
    <h2>Smart AI Assistant for Farmers</h2>
    <p>Select a feature</p>
</div>

<!-- GRID -->
<div class="grid">

<div class="card" onclick="show('crop')">
    <div class="btn" style="background-image: url('images/button1.png')"></div>
</div>

<div class="card" onclick="show('market')">
    <div class="btn" style="background-image: url('images/button2.png')"></div>
</div>

<div class="card" onclick="show('details')">
    <div class="btn" style="background-image: url('images/button3.png')"></div>
</div>

<div class="card" onclick="show('weather')">
    <div class="btn" style="background-image: url('images/button4.png')"></div>
</div>

<div class="card" onclick="show('profit')">
    <div class="btn" style="background-image: url('images/button5.png')"></div>
</div>

<div class="card" onclick="show('chat')">
    <div class="btn" style="background-image: url('images/button6.png')"></div>
</div>

<div class="card" onclick="show('scheme')">
    <div class="btn" style="background-image: url('images/button7.png')"></div>
</div>

<div class="card" onclick="show('report')">
    <div class="btn" style="background-image: url('images/button8.png')"></div>
</div>

<div class="card" onclick="show('history')">
    <div class="btn" style="background-image: url('images/button9.png')"></div>
</div>

</div>

<!-- SECTIONS (VERY IMPORTANT) -->

<div id="weather" class="section">
    <h3>Weather</h3>
</div>

<div id="crop" class="section">
    <h3>Crop Recommendation</h3>
</div>

<div id="market" class="section">
    <h3>Market</h3>
</div>

<div id="chat" class="section">
    <h3>Chatbot</h3>
</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
